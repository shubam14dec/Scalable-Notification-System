apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ns.name" . }}-ws
  labels: {{- include "ns.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ws.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ns.name" . }}
      role: ws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ns.name" . }}
        role: ws
    spec:
      containers:
        - name: ws
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["npx", "tsx", "src/ws/gateway.ts"]
          ports:
            - containerPort: {{ .Values.ws.port }}
          {{- include "ns.envFrom" . | nindent 10 }}
          readinessProbe:
            httpGet: { path: /health, port: {{ .Values.ws.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.ws.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ns.name" . }}-ws
  labels: {{- include "ns.labels" . | nindent 4 }}
spec:
  # WebSockets are long-lived: keep a client on the same pod.
  sessionAffinity: ClientIP
  selector:
    app.kubernetes.io/name: {{ include "ns.name" . }}
    role: ws
  ports:
    - port: 80
      targetPort: {{ .Values.ws.port }}
